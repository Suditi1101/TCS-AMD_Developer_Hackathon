##############################################################################
# workflow.yml — SentinelFlow v2.0
# ─────────────────────────────────────────────────────────────────────────────
# Single source of truth for the entire multi-agent pipeline.
# Supports three dataset modes: synthetic | mvtec | paderborn
# Change nodes, edges, routing, prompts, and dataset config here — no
# Python code changes needed.
##############################################################################

# ─── Global settings ─────────────────────────────────────────────────────────
global:
  name: "SentinelFlow — Intelligent Image & Signal Processing Pipeline"
  version: "2.0.0"
  llm_model: "qwen"                        # served-model-name in vLLM
  vllm_base_url: "http://localhost:8000/v1"
  max_retries: 3                           # per-agent retry limit
  log_level: "INFO"

  # ── Dataset mode ─────────────────────────────────────────────────────────
  # One of: synthetic | mvtec | paderborn
  # Notebooks read this and adjust labels, rules, and Qwen prompts accordingly.
  dataset_mode: "synthetic"

  # ── Per-mode label sets ───────────────────────────────────────────────────
  label_sets:
    synthetic:  [person, vehicle, bicycle, unknown_object, ship, wildfire_smoke]
    mvtec:      [scratch, crack, hole, contamination, bent, broken, unknown_object]
    paderborn:  [bearing_fault, imbalance, misalignment, unknown_object]

  # ── Data-source paths (Kaggle mounts) ────────────────────────────────────
  dataset_paths:
    paderborn: "data/paderborn"   # CSV/MAT files from ippatel03/paderborn-db
    mvtec:     "data/mvtec"       # PNG images  from ipythonx/mvtec-ad

  # ── Latency budgets (ms) ─────────────────────────────────────────────────
  latency_budgets:
    motion_gate:    5
    phash_dedup:    2
    tiny_detect:    30
    qwen_vl:        2000
    window_group:   50
    correlation:    20
    qwen_fog:       3000
    embedding:      50
    vector_search:  20
    deep_analysis:  5000
    alert_route:    500

  # ── Thresholds ────────────────────────────────────────────────────────────
  motion_threshold:       0.018
  hash_hamming_threshold: 8
  min_detection_conf:     0.45
  anomaly_threshold:      0.65
  hitl_conf_band:         [0.45, 0.70]
  retrain_anomaly_rate:   0.30
  gpu_autoscale_queue:    10
  backpressure_limit:     50
  qwen_vl_max_calls:      8    # cap per notebook run (demo mode)

# ─── Entry point ─────────────────────────────────────────────────────────────
entry_point: orchestrator

# ─── Nodes ───────────────────────────────────────────────────────────────────
nodes:

  orchestrator:
    agent_class: OrchestratorAgent
    description: "Plans the pipeline, delegates tasks, monitors progress, re-routes on failure"
    system_prompt: |
      You are the Orchestrator Agent for SentinelFlow — an intelligent
      multi-tier surveillance and signal-processing system.

      Your job:
        1. Inspect the current pipeline state (completed nodes, failures, dataset mode).
        2. Decide which specialist agent to activate next.
        3. If all stages are complete, return "done".
        4. If an agent failed ≥ 2 times, skip it and continue.
        5. Adjust priority based on dataset_mode:
           - paderborn: elevate any bearing_fault event to HIGH priority.
           - mvtec:     elevate any critical_defect event to HIGH priority.

      Available agents (run in order):
        ingestion → edge_filter → fog_correlator → cloud_analyser → alert_learn → done

      Respond ONLY with valid JSON:
      {
        "next": "<agent_name | done>",
        "reason": "<one sentence>",
        "priority": "normal | high | critical"
      }
    tools: []
    next_default: done

  ingestion:
    agent_class: IngestionAgent
    description: "Reads raw frames / signals from configured sources"
    system_prompt: |
      You are the Ingestion Agent for SentinelFlow.

      Your responsibilities:
        - Report on frames/signals loaded from the configured dataset.
        - Tag each frame with source_id, timestamp, dataset_mode, and resolution.
        - Warn about unreachable sources without failing the pipeline.
        - For dataset_mode=paderborn: note bearing type per file (healthy / faulty).
        - For dataset_mode=mvtec:     note category (bottle, cable, etc.).

      Respond ONLY with valid JSON:
      {
        "frames_ingested": <int>,
        "sources_active": ["<source_id>", ...],
        "sources_failed": [],
        "dataset_mode": "<mode>",
        "status": "ok | partial | failed",
        "message": "<summary>"
      }
    tools: [read_camera_stream, read_satellite_feed, read_sensor_stream]
    next_default: edge_filter

  edge_filter:
    agent_class: EdgeFilterAgent
    description: "Motion gate · dedup · tiny detect · Qwen-VL · adaptive sampler · latency monitor"
    system_prompt: |
      You are the Edge Filter Agent for SentinelFlow.

      Your responsibilities:
        - Summarise the results of motion gating, perceptual-hash deduplication,
          tiny detection, and optional Qwen-VL verification.
        - Report the data reduction achieved.
        - Note the dataset_mode and which label set was used.
        - Flag any latency budget violations.

      Detection label sets by mode:
        synthetic:  person, vehicle, bicycle, unknown_object, ship, wildfire_smoke
        mvtec:      scratch, crack, hole, contamination, bent, broken, unknown_object
        paderborn:  bearing_fault, imbalance, misalignment, unknown_object

      Respond ONLY with valid JSON:
      {
        "frames_received": <int>,
        "frames_dropped_motion": <int>,
        "frames_dropped_duplicate": <int>,
        "frames_processed": <int>,
        "events_emitted": <int>,
        "data_reduction_pct": <float>,
        "detection_summary": {"<label>": <count>},
        "dataset_mode": "<mode>",
        "latency_violations": ["<stage>", ...],
        "status": "ok | warn | failed",
        "message": "<summary>"
      }
    tools: [motion_gate, keyframe_select, tiny_detect, roi_encode, qwen_vl_verify]
    next_default: fog_correlator

  fog_correlator:
    agent_class: FogCorrelatorAgent
    description: "Time-windowed correlation · dataset-aware rules · Qwen reasoning · backpressure"
    system_prompt: |
      You are the Fog Correlator Agent for SentinelFlow.

      Your responsibilities:
        - Group detection events into 5-second time windows.
        - Apply correlation rules appropriate for the dataset_mode:

          synthetic rules:
            · 2+ cameras detect "person"          → MEDIUM
            · 2+ cameras detect "vehicle"          → HIGH
            · "unknown_object" conf > 0.80         → HIGH
            · 3+ sources, mixed labels             → CRITICAL
            · "wildfire_smoke" any source          → CRITICAL

          mvtec rules:
            · ≥2 defect detections in one window   → HIGH  (defect_cluster)
            · "hole" or "broken" conf > 0.75       → CRITICAL (critical_defect)
            · "contamination" or "bent"            → MEDIUM (surface_anomaly)

          paderborn rules:
            · "bearing_fault" conf > 0.70          → HIGH  (bearing_fault_confirmed)
            · "imbalance"                          → MEDIUM
            · "misalignment"                       → MEDIUM
            · 2+ fault types in one window         → CRITICAL (multi_fault)

        - For events that match no rule, use your own judgement.
        - Only escalate HIGH and CRITICAL events to cloud.

      Respond ONLY with valid JSON:
      {
        "windows_processed": <int>,
        "correlated_events": [
          {
            "correlation_id": "<uuid>",
            "event_type": "<rule_name>",
            "severity": "low | medium | high | critical",
            "involved_sources": ["<source_id>", ...],
            "avg_confidence": <float>,
            "description": "<human readable>",
            "should_escalate": <bool>,
            "dataset_mode": "<mode>"
          }
        ],
        "escalated_count": <int>,
        "backpressure_triggered": <bool>,
        "status": "ok | warn | failed",
        "message": "<summary>"
      }
    tools: [window_group, correlation_rules, severity_score, qwen_fog_reason]
    next_default: cloud_analyser

  cloud_analyser:
    agent_class: CloudAnalyserAgent
    description: "Deep analysis · vector search · anomaly scoring · HITL · GPU autoscale"
    system_prompt: |
      You are the Cloud Analyser Agent for SentinelFlow.

      Your responsibilities:
        - Perform deep narrative analysis of each escalated event.
        - Score anomaly level (0.0 = normal, 1.0 = completely novel).
        - Generate a human-readable narrative and recommended action.
        - Adapt recommendations to dataset_mode:
            mvtec:     → quarantine batch / maintenance schedule / QC gate
            paderborn: → bearing replacement / load reduction / shutdown priority
            synthetic: → dispatch security / alert authorities / increase surveillance
        - Flag for HITL review when avg_confidence is in [0.45, 0.70].
        - Set retrain_triggered=true if anomaly_rate > 0.30 or a novel pattern is found.

      Respond ONLY with valid JSON:
      {
        "results": [
          {
            "analysis_id": "<uuid>",
            "correlation_id": "<uuid>",
            "anomaly_score": <float 0-1>,
            "summary": "<2-3 sentence narrative>",
            "root_cause": "<1 sentence>",
            "recommended_action": "<specific action>",
            "confidence_assessment": "<1 sentence>",
            "similar_past_events": ["<id>", ...],
            "retrain_flag": <bool>,
            "hitl_review": <bool>,
            "dataset_mode": "<mode>"
          }
        ],
        "avg_anomaly_score": <float>,
        "retrain_triggered": <bool>,
        "hitl_pending": <int>,
        "gpu_scaled": <bool>,
        "status": "ok | warn | failed",
        "message": "<summary>"
      }
    tools: [embed_event, vector_search, anomaly_score, deep_analyse, hitl_queue, gpu_autoscale]
    next_default: alert_learn

  alert_learn:
    agent_class: AlertLearnAgent
    description: "Routes to webhook / Slack / dashboard · submits retraining job"
    system_prompt: |
      You are the Alert & Learning Agent for SentinelFlow — the final pipeline stage.

      Your responsibilities:
        - CRITICAL events → send webhook alert immediately
        - HIGH events     → send Slack notification
        - MEDIUM events   → log to dashboard
        - LOW events      → write to audit log only
        - If retrain_triggered=true: submit a fine-tuning job with HITL labels.
        - Always write a summary entry to the data lake.
        - Note dataset_mode in every notification so operators know the context.
        - Include HITL-pending count in the summary.

      Respond ONLY with valid JSON:
      {
        "alerts_sent": ["<analysis_id>", ...],
        "notifications": [
          {"channel": "webhook | slack | dashboard | log",
           "severity": "critical | high | medium | low",
           "message": "<message>"}
        ],
        "retrain_submitted": <bool>,
        "retrain_dataset": "<mode>",
        "hitl_pending": <int>,
        "data_lake_entries": <int>,
        "status": "ok | warn | failed",
        "message": "<summary>"
      }
    tools: [send_webhook, send_slack, log_dashboard, submit_retrain, write_data_lake]
    next_default: done

# ─── Edges ───────────────────────────────────────────────────────────────────
edges:
  - { from: orchestrator,   to: ingestion,      condition: "next == 'ingestion'",      label: "start ingestion" }
  - { from: orchestrator,   to: edge_filter,    condition: "next == 'edge_filter'",    label: "filter frames"   }
  - { from: orchestrator,   to: fog_correlator, condition: "next == 'fog_correlator'", label: "correlate events"}
  - { from: orchestrator,   to: cloud_analyser, condition: "next == 'cloud_analyser'", label: "deep analysis"   }
  - { from: orchestrator,   to: alert_learn,    condition: "next == 'alert_learn'",    label: "alert and learn" }
  - { from: orchestrator,   to: __end__,        condition: "next == 'done'",           label: "pipeline complete"}

  # All worker agents return to orchestrator for re-planning
  - { from: ingestion,      to: orchestrator, condition: always, label: "report back" }
  - { from: edge_filter,    to: orchestrator, condition: always, label: "report back" }
  - { from: fog_correlator, to: orchestrator, condition: always, label: "report back" }
  - { from: cloud_analyser, to: orchestrator, condition: always, label: "report back" }
  - { from: alert_learn,    to: orchestrator, condition: always, label: "report back" }

# ─── Routing ─────────────────────────────────────────────────────────────────
routing:
  orchestrator:
    type: conditional
    source_field: "next"
    routes:
      ingestion:      ingestion
      edge_filter:    edge_filter
      fog_correlator: fog_correlator
      cloud_analyser: cloud_analyser
      alert_learn:    alert_learn
      done:           __end__
    fallback: __end__

  ingestion:      { type: fixed, to: orchestrator }
  edge_filter:    { type: fixed, to: orchestrator }
  fog_correlator: { type: fixed, to: orchestrator }
  cloud_analyser: { type: fixed, to: orchestrator }
  alert_learn:    { type: fixed, to: orchestrator }

# ─── Tools registry ──────────────────────────────────────────────────────────
tools:
  # Ingestion
  read_camera_stream:  { module: "tools.ingestion_tools", function: "read_camera_stream"  }
  read_satellite_feed: { module: "tools.ingestion_tools", function: "read_satellite_feed" }
  read_sensor_stream:  { module: "tools.ingestion_tools", function: "read_sensor_stream"  }

  # Edge
  motion_gate:         { module: "tools.edge_tools",      function: "motion_gate"         }
  keyframe_select:     { module: "tools.edge_tools",      function: "keyframe_select"     }
  tiny_detect:         { module: "tools.edge_tools",      function: "tiny_detect"         }
  roi_encode:          { module: "tools.edge_tools",      function: "roi_encode"          }
  qwen_vl_verify:      { module: "tools.edge_tools",      function: "qwen_vl_verify"      }

  # Fog
  window_group:        { module: "tools.fog_tools",       function: "window_group"        }
  correlation_rules:   { module: "tools.fog_tools",       function: "correlation_rules"   }
  severity_score:      { module: "tools.fog_tools",       function: "severity_score"      }
  qwen_fog_reason:     { module: "tools.fog_tools",       function: "qwen_fog_reason"     }

  # Cloud
  embed_event:         { module: "tools.cloud_tools",     function: "embed_event"         }
  vector_search:       { module: "tools.cloud_tools",     function: "vector_search"       }
  anomaly_score:       { module: "tools.cloud_tools",     function: "anomaly_score"       }
  deep_analyse:        { module: "tools.cloud_tools",     function: "deep_analyse"        }
  hitl_queue:          { module: "tools.cloud_tools",     function: "hitl_queue"          }
  gpu_autoscale:       { module: "tools.cloud_tools",     function: "gpu_autoscale"       }

  # Alert
  send_webhook:        { module: "tools.alert_tools",     function: "send_webhook"        }
  send_slack:          { module: "tools.alert_tools",     function: "send_slack"          }
  log_dashboard:       { module: "tools.alert_tools",     function: "log_dashboard"       }
  submit_retrain:      { module: "tools.alert_tools",     function: "submit_retrain"      }
  write_data_lake:     { module: "tools.alert_tools",     function: "write_data_lake"     }

# ─── Data sources ─────────────────────────────────────────────────────────────
sources:
  - { id: cam_001,    type: camera,    uri: "rtsp://192.168.1.10/stream",         fps: 30, resolution: [1920, 1080] }
  - { id: cam_002,    type: camera,    uri: "rtsp://192.168.1.11/stream",         fps: 30, resolution: [1920, 1080] }
  - { id: sat_001,    type: satellite, provider: sentinel2,
      region: [28.6, 77.2, 28.7, 77.3], interval_minutes: 10 }
  - { id: sensor_001, type: sensor,   uri: "mqtt://broker:1883/zone4/vibration",  sample_rate_hz: 1000 }
  - { id: sensor_002, type: sensor,   uri: "mqtt://broker:1883/zone4/temperature",sample_rate_hz: 100  }
